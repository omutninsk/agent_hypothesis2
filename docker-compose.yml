services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: agent-sandbox:latest
    command: ["true"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      sandbox:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql://agent:agent@postgres:5432/agent_db
      TMPDIR: /tmp/agent_workspaces
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/agent_workspaces:/tmp/agent_workspaces
      - ./skills:/app/skills
    restart: unless-stopped

volumes:
  pgdata:
