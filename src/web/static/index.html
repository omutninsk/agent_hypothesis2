<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Hypothesis 2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

/* Tabs */
.tabs { display: flex; background: #16213e; border-bottom: 2px solid #0f3460; }
.tab { padding: 12px 24px; cursor: pointer; border: none; background: none; color: #8892b0; font-size: 14px; font-weight: 600; transition: all 0.2s; }
.tab:hover { color: #ccd6f6; background: rgba(255,255,255,0.05); }
.tab.active { color: #64ffda; border-bottom: 2px solid #64ffda; margin-bottom: -2px; }

/* Panels */
.panel { flex: 1; display: none; flex-direction: column; overflow: hidden; padding: 16px; }
.panel.active { display: flex; }

/* Chat */
#chat-messages { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
.msg { padding: 10px 14px; border-radius: 8px; max-width: 80%; word-wrap: break-word; white-space: pre-wrap; font-size: 14px; line-height: 1.5; }
.msg.user { align-self: flex-end; background: #0f3460; color: #ccd6f6; }
.msg.agent { align-self: flex-start; background: #1e2d4a; color: #e0e0e0; }
.msg.progress { align-self: flex-start; background: transparent; color: #8892b0; font-size: 12px; padding: 4px 14px; }
.msg.error { align-self: flex-start; background: #3d1f1f; color: #ff6b6b; font-size: 13px; }
.msg a { color: #64ffda; text-decoration: underline; word-break: break-all; }
.msg a:hover { color: #a0ffed; }
#chat-input-area { display: flex; gap: 8px; padding-top: 12px; }
#chat-input { flex: 1; padding: 10px 14px; border: 1px solid #0f3460; border-radius: 8px; background: #16213e; color: #e0e0e0; font-size: 14px; outline: none; resize: none; min-height: 44px; max-height: 120px; }
#chat-input:focus { border-color: #64ffda; }
#send-btn, .btn { padding: 10px 20px; border: none; border-radius: 8px; background: #0f3460; color: #64ffda; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
#send-btn:hover, .btn:hover { background: #1a4a8a; }
.btn-danger { background: #5c1a1a; color: #ff6b6b; }
.btn-danger:hover { background: #7a2222; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* Status bar */
.status-bar { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 12px; color: #8892b0; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-dot.connected { background: #64ffda; }
.status-dot.disconnected { background: #ff6b6b; }

/* Prompts */
.prompt-selector { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.prompt-selector select { flex: 1; padding: 8px 12px; border: 1px solid #0f3460; border-radius: 6px; background: #16213e; color: #e0e0e0; font-size: 14px; }
.prompt-textarea { flex: 1; width: 100%; padding: 12px; border: 1px solid #0f3460; border-radius: 8px; background: #16213e; color: #e0e0e0; font-size: 13px; font-family: monospace; resize: vertical; outline: none; }
.prompt-textarea:focus { border-color: #64ffda; }
.prompt-actions { display: flex; gap: 8px; padding-top: 12px; align-items: center; }
.prompt-info { font-size: 12px; color: #8892b0; margin-left: auto; }
.override-badge { background: #2a4a2a; color: #64ffda; padding: 2px 8px; border-radius: 4px; font-size: 11px; }

/* Settings */
.settings-section { margin-bottom: 24px; }
.settings-section h3 { color: #64ffda; margin-bottom: 12px; font-size: 15px; }
.setting-row { display: flex; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.setting-key { min-width: 200px; font-size: 13px; color: #8892b0; }
.setting-value { flex: 1; padding: 6px 10px; border: 1px solid #0f3460; border-radius: 4px; background: #16213e; color: #e0e0e0; font-size: 13px; outline: none; }
.setting-value:focus { border-color: #64ffda; }

/* Prompt Blocks */
.block-toggles { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.block-toggle { display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 4px; background: #16213e; font-size: 12px; cursor: pointer; user-select: none; }
.block-toggle input { accent-color: #64ffda; }
.block-toggle.checked { background: #1a3a2a; color: #64ffda; }
#blocks-log { flex: 1; overflow-y: auto; padding: 8px; font-family: monospace; font-size: 12px; line-height: 1.6; }
.block-entry { margin-bottom: 12px; border-left: 3px solid #0f3460; padding-left: 10px; }
.block-entry-header { color: #64ffda; font-weight: 600; margin-bottom: 4px; }
.block-entry-content { color: #a0a0b0; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #1a4a8a; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" data-tab="chat">Chat</button>
  <button class="tab" data-tab="prompts">Prompts</button>
  <button class="tab" data-tab="settings">Settings</button>
  <button class="tab" data-tab="blocks">Prompt Blocks</button>
</div>

<!-- Chat Tab -->
<div id="chat" class="panel active">
  <div class="status-bar">
    <span class="status-dot disconnected" id="ws-dot"></span>
    <span id="ws-status">Disconnected</span>
    <span style="margin-left:auto" id="active-tasks"></span>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-input-area">
    <textarea id="chat-input" placeholder="Send a message..." rows="1"></textarea>
    <button id="send-btn">Send</button>
    <button class="btn btn-danger btn-sm" id="stop-btn" title="Stop all tasks">Stop</button>
  </div>
</div>

<!-- Prompts Tab -->
<div id="prompts" class="panel">
  <div class="prompt-selector">
    <select id="prompt-select"></select>
    <span class="override-badge" id="override-badge" style="display:none">OVERRIDE</span>
  </div>
  <textarea class="prompt-textarea" id="prompt-editor" rows="20"></textarea>
  <div class="prompt-actions">
    <button class="btn" id="save-prompt-btn">Save Override</button>
    <button class="btn btn-danger" id="reset-prompt-btn">Reset to Default</button>
    <span class="prompt-info" id="prompt-info"></span>
  </div>
</div>

<!-- Settings Tab -->
<div id="settings" class="panel" style="overflow-y:auto">
  <div class="settings-section">
    <h3>Agent Settings (runtime key-value)</h3>
    <div id="agent-settings-list"></div>
    <div style="display:flex;gap:8px;padding-top:8px">
      <input class="setting-value" id="new-agent-key" placeholder="key" style="max-width:200px">
      <input class="setting-value" id="new-agent-val" placeholder="value">
      <button class="btn btn-sm" id="add-agent-setting-btn">Add</button>
    </div>
  </div>
  <div class="settings-section">
    <h3>Environment Settings</h3>
    <div id="env-settings-list"></div>
  </div>
</div>

<!-- Prompt Blocks Tab -->
<div id="blocks" class="panel">
  <div class="block-toggles" id="block-toggles"></div>
  <div id="blocks-log"></div>
</div>

<script>
const WS_URL = `ws://${location.host}/ws/0`;
const CHAT_ID = 0;
let ws = null;
let reconnectTimer = null;
let promptsData = [];

// --- WebSocket ---
function connectWS() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('ws-dot').className = 'status-dot connected';
    document.getElementById('ws-status').textContent = 'Connected';
  };
  ws.onclose = () => {
    document.getElementById('ws-dot').className = 'status-dot disconnected';
    document.getElementById('ws-status').textContent = 'Disconnected';
    reconnectTimer = setTimeout(connectWS, 3000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      handleWSMessage(data);
    } catch {}
  };
}

function handleWSMessage(data) {
  const messages = document.getElementById('chat-messages');
  const blocksLog = document.getElementById('blocks-log');

  switch (data.type) {
    case 'message':
      addChatMessage('agent', data.text);
      break;
    case 'progress':
      addChatMessage('progress', `[Step ${data.step}] ${data.status}...`);
      break;
    case 'error':
      addChatMessage('error', `[Step ${data.step}] Error: ${data.error}`);
      break;
    case 'prompt_block':
      addBlockEntry(data.block, data.content);
      break;
  }
}

function linkify(text) {
  // Escape HTML first, then convert URLs to clickable links
  const escaped = escapeHtml(text);
  return escaped.replace(
    /https?:\/\/[^\s<>&"')\]]+/g,
    url => `<a href="${url}" target="_blank" rel="noopener" style="color:#64ffda;text-decoration:underline">${url}</a>`
  );
}

function addChatMessage(type, text) {
  const messages = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  // Agent messages and progress: render links; user messages: plain text
  if (type === 'user') {
    div.textContent = text;
  } else {
    div.innerHTML = linkify(text);
  }
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addBlockEntry(block, content) {
  const log = document.getElementById('blocks-log');
  const entry = document.createElement('div');
  entry.className = 'block-entry';
  const chars = content.length;
  entry.innerHTML = `<div class="block-entry-header">[${escapeHtml(block.toUpperCase())}] (${chars} chars)</div><div class="block-entry-content">${escapeHtml(content)}</div>`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// --- Chat ---
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  addChatMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  try {
    const r = await fetch('/api/chat/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
    });
    const data = await r.json();
    if (data.error) addChatMessage('error', data.error);
  } catch (e) {
    addChatMessage('error', `Failed to send: ${e.message}`);
  }
}

async function stopAll() {
  try {
    await fetch('/api/chat/stop', {method: 'POST'});
  } catch {}
}

async function checkStatus() {
  try {
    const r = await fetch('/api/chat/status');
    const data = await r.json();
    document.getElementById('active-tasks').textContent = data.count > 0 ? `${data.count} active` : '';
  } catch {}
}

// --- Prompts ---
async function loadPrompts() {
  try {
    const r = await fetch('/api/prompts');
    const data = await r.json();
    promptsData = data.prompts;
    const select = document.getElementById('prompt-select');
    select.innerHTML = '';
    promptsData.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name + (p.is_override ? ' *' : '');
      select.appendChild(opt);
    });
    if (promptsData.length > 0) selectPrompt(promptsData[0].name);
  } catch {}
}

function selectPrompt(name) {
  const p = promptsData.find(x => x.name === name);
  if (!p) return;
  document.getElementById('prompt-editor').value = p.content;
  document.getElementById('override-badge').style.display = p.is_override ? '' : 'none';
  document.getElementById('prompt-info').textContent = `Original: ${p.original_length} chars | Current: ${p.content.length} chars`;
}

async function savePromptOverride() {
  const name = document.getElementById('prompt-select').value;
  const content = document.getElementById('prompt-editor').value;
  try {
    await fetch('/api/prompts', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, content}),
    });
    await loadPrompts();
    document.getElementById('prompt-select').value = name;
    selectPrompt(name);
  } catch {}
}

async function resetPrompt() {
  const name = document.getElementById('prompt-select').value;
  try {
    await fetch(`/api/prompts/${name}`, {method: 'DELETE'});
    await loadPrompts();
    document.getElementById('prompt-select').value = name;
    selectPrompt(name);
  } catch {}
}

// --- Settings ---
async function loadAgentSettings() {
  try {
    const r = await fetch('/api/settings/agent');
    const data = await r.json();
    const list = document.getElementById('agent-settings-list');
    list.innerHTML = '';
    data.settings.forEach(s => {
      const row = document.createElement('div');
      row.className = 'setting-row';
      row.innerHTML = `<span class="setting-key">${escapeHtml(s.key)}</span><input class="setting-value" value="${escapeHtml(s.value)}" data-key="${escapeHtml(s.key)}"><button class="btn btn-sm" onclick="saveAgentSetting('${escapeHtml(s.key)}', this)">Save</button><button class="btn btn-danger btn-sm" onclick="deleteAgentSetting('${escapeHtml(s.key)}')">X</button>`;
      list.appendChild(row);
    });
  } catch {}
}

async function saveAgentSetting(key, btn) {
  const input = btn.previousElementSibling;
  try {
    await fetch('/api/settings/agent', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({key, value: input.value}),
    });
  } catch {}
}

async function deleteAgentSetting(key) {
  try {
    await fetch(`/api/settings/agent/${key}`, {method: 'DELETE'});
    await loadAgentSettings();
  } catch {}
}

async function addAgentSetting() {
  const key = document.getElementById('new-agent-key').value.trim();
  const val = document.getElementById('new-agent-val').value.trim();
  if (!key) return;
  try {
    await fetch('/api/settings/agent', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({key, value: val}),
    });
    document.getElementById('new-agent-key').value = '';
    document.getElementById('new-agent-val').value = '';
    await loadAgentSettings();
  } catch {}
}

async function loadEnvSettings() {
  try {
    const r = await fetch('/api/settings/env');
    const data = await r.json();
    const list = document.getElementById('env-settings-list');
    list.innerHTML = '';
    Object.entries(data.settings).sort().forEach(([k, v]) => {
      const row = document.createElement('div');
      row.className = 'setting-row';
      row.innerHTML = `<span class="setting-key">${escapeHtml(k)}</span><input class="setting-value" value="${escapeHtml(v)}" id="env-${k}"><button class="btn btn-sm" onclick="saveEnvSetting('${k}')">Save</button>`;
      list.appendChild(row);
    });
  } catch {}
}

async function saveEnvSetting(field) {
  const input = document.getElementById(`env-${field}`);
  try {
    const r = await fetch('/api/settings/env', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({field, value: input.value}),
    });
    const data = await r.json();
    if (data.error) alert(data.error);
  } catch {}
}

// --- Prompt Blocks ---
async function loadBlockConfig() {
  try {
    const r = await fetch('/api/prompt-blocks/config');
    const data = await r.json();
    const container = document.getElementById('block-toggles');
    container.innerHTML = '';
    data.all_blocks.forEach(b => {
      const checked = data.enabled.includes(b);
      const label = document.createElement('label');
      label.className = `block-toggle${checked ? ' checked' : ''}`;
      label.innerHTML = `<input type="checkbox" ${checked ? 'checked' : ''} data-block="${b}">${b}`;
      label.querySelector('input').addEventListener('change', updateBlockConfig);
      container.appendChild(label);
    });
  } catch {}
}

async function updateBlockConfig() {
  const checks = document.querySelectorAll('#block-toggles input[type=checkbox]');
  const enabled = [];
  checks.forEach(c => {
    c.parentElement.className = `block-toggle${c.checked ? ' checked' : ''}`;
    if (c.checked) enabled.push(c.dataset.block);
  });
  try {
    await fetch('/api/prompt-blocks/config', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({enabled}),
    });
  } catch {}
}

// --- Tab switching ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');

    // Lazy load
    if (tab.dataset.tab === 'prompts' && promptsData.length === 0) loadPrompts();
    if (tab.dataset.tab === 'settings') { loadAgentSettings(); loadEnvSettings(); }
    if (tab.dataset.tab === 'blocks') loadBlockConfig();
  });
});

// --- Event listeners ---
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('stop-btn').addEventListener('click', stopAll);
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
document.getElementById('prompt-select').addEventListener('change', (e) => selectPrompt(e.target.value));
document.getElementById('save-prompt-btn').addEventListener('click', savePromptOverride);
document.getElementById('reset-prompt-btn').addEventListener('click', resetPrompt);
document.getElementById('add-agent-setting-btn').addEventListener('click', addAgentSetting);

// --- Init ---
connectWS();
setInterval(checkStatus, 5000);

// Load chat history on start
(async () => {
  try {
    const r = await fetch('/api/chat/history');
    const data = await r.json();
    data.tasks.reverse().forEach(t => {
      addChatMessage('user', t.description);
      if (t.result) addChatMessage('agent', t.result);
      if (t.status === 'failed') addChatMessage('error', `Task failed`);
    });
  } catch {}
})();
</script>
</body>
</html>
